services:

  # ============================================================
  # SQL SERVER - PRIMARY NODE
  # ============================================================
  sql-primary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-primary
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "<YOUR_SA_PASSWORD>"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1433:1433"
    networks:
      - sqlserver-ag
      - monitoring
    volumes:
      - sql-primary-data:/var/opt/mssql

  # ============================================================
  # SQL SERVER - SECONDARY NODE
  # ============================================================
  sql-secondary:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-secondary
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "<YOUR_SA_PASSWORD>"
      MSSQL_AGENT_ENABLED: "true"
    ports:
      - "1434:1433"
    networks:
      - sqlserver-ag
      - monitoring
    volumes:
      - sql-secondary-data:/var/opt/mssql

  # ============================================================
  # ZABBIX - PostgreSQL Database (backend for Zabbix)
  # ============================================================
  zabbix-db:
    image: postgres:15
    container_name: zabbix-db
    environment:
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <YOUR_ZABBIX_DB_PASSWORD>
    networks:
      - monitoring
    volumes:
      - zabbix-db-data:/var/lib/postgresql/data

  # ============================================================
  # ZABBIX SERVER
  # ============================================================
  zabbix-server:
    image: zabbix/zabbix-server-pgsql:latest
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <YOUR_ZABBIX_DB_PASSWORD>
    ports:
      - "10051:10051"
    networks:
      - monitoring
    depends_on:
      - zabbix-db

  # ============================================================
  # ZABBIX WEB UI
  # ============================================================
  zabbix-web:
    image: zabbix/zabbix-web-nginx-pgsql:latest
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: zabbix-db
      POSTGRES_DB: zabbix
      POSTGRES_USER: zabbix
      POSTGRES_PASSWORD: <YOUR_ZABBIX_DB_PASSWORD>
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: "Africa/Johannesburg"
    ports:
      - "8080:8080"
    networks:
      - monitoring
    depends_on:
      - zabbix-server
      - zabbix-db

  # ============================================================
  # PERCONA PMM SERVER (Monitoring Dashboard)
  # ============================================================
  pmm-server:
    image: percona/pmm-server:2
    container_name: pmm-server
    ports:
      - "8443:443"
      - "8081:80"
    networks:
      - monitoring
    volumes:
      - pmm-data:/srv

networks:
  sqlserver-ag:
    external: true
  monitoring:
    driver: bridge

volumes:
  sql-primary-data:
  sql-secondary-data:
  zabbix-db-data:
  pmm-data:
